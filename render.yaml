services:
  - type: web
    name: plant-disease-yolo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ROBOFLOW_API_KEY
        sync: false
      - key: MODEL_ID
        value: plant-disease-ep6jy/2
      - key: INFERENCE_MODE
        value: serverless
      - key: CONFIDENCE_THRESHOLD
        value: "0.4"
